<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kiki or Bouba?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="site-nav">
    <a class="nav-link active" href="index.html">Language</a>
    <a class="nav-link" href="name-generator.html">Name Generator</a>
  </nav>

  <header class="hero">
    <h1>The Grand Floof has requested we remove all <span class="kiki-text">kiki</span> words from our vocabulary.</h1>
    <p class="subtitle">
      Please help us vote to keep our language <span class="bouba-text">bouba</span>.
    </p>
  </header>

  <main>
    <section class="board-section">
      <div id="board" class="board" aria-live="polite">
        <p class="loading">Loading words…</p>
      </div>
    </section>

    <section class="submit-section">
      <form id="submit-form" class="inline-form">
        <input
          id="word-input"
          class="text-input"
          type="text"
          maxlength="40"
          placeholder="Add a word to vote on…"
          autocomplete="off"
          required
        />
        <button type="submit" class="primary-btn">Add word</button>
      </form>
      <p id="submit-message" class="submit-message" aria-live="polite"></p>
    </section>
  </main>

  <footer>
    <p>Votes are public and live. One vote per word per browser.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
